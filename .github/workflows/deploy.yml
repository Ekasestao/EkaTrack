name: Deploy to GitHub Pages

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test APP/Fuentes/EkaWatch.Tests/EkaWatch.Tests.csproj -c Release

      - name: Set base href
        run: sed -i 's|<base href="/" />|<base href="/EkaWatch/" />|g' APP/Fuentes/EkaWatch.Client/wwwroot/index.html

      - name: Publish
        run: dotnet publish APP/Fuentes/EkaWatch.Client/EkaWatch.Client.csproj -c Release -o release --nologo

      - name: List lib
        run: find release/wwwroot/lib -type f 2>&1 | head -20

      - name: Fix SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: release/wwwroot
